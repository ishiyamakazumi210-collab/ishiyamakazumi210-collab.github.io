<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="400" viewBox="0 0 1600 400">
  <defs>
    <filter id="roughen" x="-7%" y="-35%" width="114%" height="170%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.13" numOctaves="2" seed="27" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.1" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <mask id="markerWear" maskUnits="userSpaceOnUse">
      <rect width="1600" height="400" fill="white"/>
      <g stroke="black" stroke-linecap="round" stroke-width="3" opacity="0.07">
        <path d="M190 172c62-8 118-4 178-10"/>
        <path d="M630 242c70-9 131-4 194-11"/>
        <path d="M1005 169c58-8 121-4 176-9"/>
      </g>
      <g stroke="black" stroke-linecap="round" stroke-width="2" opacity="0.05">
        <path d="M318 130c52 5 94 1 143 4"/>
        <path d="M795 146c60 5 104 1 160 4"/>
        <path d="M1105 238c46 4 81-2 122 2"/>
      </g>
    </mask>
    <style>
      .letter {
        font-family: "Hiragino Maru Gothic ProN", "Hiragino Sans", sans-serif;
        font-size: 126px;
        font-weight: 900;
        stroke-width: 7px;
        paint-order: stroke fill;
        stroke-linejoin: round;
        stroke-linecap: round;
      }
      .num {
        font-family: "Arial Rounded MT Bold", "Hiragino Maru Gothic ProN", sans-serif;
        font-size: 142px;
        font-weight: 900;
        stroke-width: 7px;
        paint-order: stroke fill;
        stroke-linejoin: round;
        stroke-linecap: round;
      }
      .question {
        font-size: 158px;
        stroke-width: 8px;
      }
      .teal { fill: #2F7890; stroke: #2F7890; }
      .orange { fill: #F0831E; stroke: #F0831E; }
      .spark {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 9px;
      }
    </style>
  </defs>
  <g filter="url(#roughen)" mask="url(#markerWear)">
    <text class="num teal" x="92" y="240" transform="rotate(-3 92 240)">10</text>
    <text class="letter teal" x="268" y="232" transform="rotate(3 268 232)">人</text>
    <text class="letter teal" x="402" y="244" transform="rotate(-2 402 244)">で</text>
    <text class="letter teal" x="532" y="230" transform="rotate(2 532 230)">行</text>
    <text class="letter teal" x="664" y="242" transform="rotate(-3 664 242)">く</text>
    <text class="letter teal" x="788" y="232" transform="rotate(3 788 232)">と</text>
    <text class="letter teal" x="908" y="242" transform="rotate(-3 908 242)">、</text>
    <text class="letter orange" x="1002" y="232" transform="rotate(2 1002 232)">い</text>
    <text class="letter orange" x="1124" y="244" transform="rotate(-2 1124 244)">く</text>
    <text class="letter orange" x="1248" y="232" transform="rotate(3 1248 232)">ら</text>
    <text class="letter orange question" x="1364" y="246" transform="rotate(-6 1364 246)">？</text>
  </g>
  <g filter="url(#roughen)" opacity="0.96">
    <path class="spark teal" d="M73 137l0 45M51 159l45 0"/>
    <path class="spark orange" d="M1434 102l0 38M1415 121l38 0"/>
    <path class="spark teal" d="M1494 260l0 30M1479 275l30 0"/>
  </g>
</svg>
