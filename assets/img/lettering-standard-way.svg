<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="400" viewBox="0 0 1600 400">
  <defs>
    <filter id="roughen" x="-6%" y="-35%" width="112%" height="170%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.12" numOctaves="2" seed="14" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <mask id="markerWear" maskUnits="userSpaceOnUse">
      <rect width="1600" height="400" fill="white"/>
      <g stroke="black" stroke-linecap="round" stroke-width="3" opacity="0.07">
        <path d="M190 188c45-9 82-5 126-12"/>
        <path d="M540 242c58-9 112-4 166-11"/>
        <path d="M900 173c52-8 109-4 158-9"/>
        <path d="M1180 246c45-7 91-3 135-8"/>
      </g>
      <g stroke="black" stroke-linecap="round" stroke-width="2" opacity="0.05">
        <path d="M270 145c42 4 73-1 111 2"/>
        <path d="M714 156c52 5 91 1 141 4"/>
        <path d="M1045 205c50 4 88-1 132 3"/>
      </g>
    </mask>
    <style>
      .letter {
        font-family: "Hiragino Maru Gothic ProN", "Hiragino Sans", sans-serif;
        font-size: 112px;
        font-weight: 900;
        stroke-width: 7px;
        paint-order: stroke fill;
        stroke-linejoin: round;
        stroke-linecap: round;
      }
      .teal { fill: #2F7890; stroke: #2F7890; }
      .orange { fill: #F0831E; stroke: #F0831E; }
      .spark {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 9px;
      }
    </style>
  </defs>
  <g filter="url(#roughen)" mask="url(#markerWear)">
    <text class="letter teal" x="96" y="234" transform="rotate(-3 96 234)">ま</text>
    <text class="letter teal" x="200" y="226" transform="rotate(2 200 226)">ず</text>
    <text class="letter teal" x="304" y="238" transform="rotate(-2 304 238)">は</text>
    <text class="letter teal" x="405" y="234" transform="rotate(5 405 234)">、</text>
    <text class="letter orange" x="490" y="222" transform="rotate(-3 490 222)">定</text>
    <text class="letter orange" x="608" y="236" transform="rotate(3 608 236)">番</text>
    <text class="letter teal" x="730" y="228" transform="rotate(-2 730 228)">の</text>
    <text class="letter teal" x="842" y="240" transform="rotate(2 842 240)">過</text>
    <text class="letter teal" x="958" y="230" transform="rotate(-2 958 230)">ご</text>
    <text class="letter teal" x="1068" y="238" transform="rotate(3 1068 238)">し</text>
    <text class="letter teal" x="1168" y="225" transform="rotate(-3 1168 225)">方</text>
    <text class="letter teal" x="1284" y="238" transform="rotate(2 1284 238)">か</text>
    <text class="letter teal" x="1392" y="230" transform="rotate(-2 1392 230)">ら</text>
    <text class="letter teal" x="1488" y="236" transform="rotate(5 1488 236)">。</text>
  </g>
  <g filter="url(#roughen)" opacity="0.96">
    <path class="spark teal" d="M72 132l0 47M49 155l47 0"/>
    <path class="spark orange" d="M1492 261l0 42M1471 282l42 0"/>
    <path class="spark teal" d="M1435 91l0 28M1421 105l28 0"/>
  </g>
</svg>
